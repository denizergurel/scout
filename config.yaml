  - "augmented reality breakthrough"
  - "mixed reality enterprise"
  - "XR developer tools"
  - "frontier AI model launch"
  - "computer vision 3D"

# --- Output Settings ---
output:
  daily_dir: "output/daily"
  raw_file: "raw_items.json"
  filtered_file: "filtered_items.json"
  categorized_file: "categorized_items.json"
  weekly_file: "weekly_draft.json"
