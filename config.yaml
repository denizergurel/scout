# Scout Configuration
# Everything below defines your newsletter's identity, editorial behavior,
# and sources. Change these to retarget Scout to a different topic area.

# --- Newsletter Identity ---
newsletter:
  name: "Spatial Report"
  slug: "spatial-report"
  cadence: "weekly"
  topics: "Spatial Computing, XR, and frontier AI"

# --- Automation ---
# When the daily pipeline runs. Local time, 24h format (HH:MM).
# Editable from Settings → Automation in the dashboard.
automation:
  schedule_time: "08:00"

# --- Editorial Settings ---
# Hide reasons are intentionally universal across all newsletters — these are
# the three judgment calls every editor makes. The dashboard reads them from
# here so the backend and the toast UI share one source of truth.
editorial:
  hide_reasons:
    - id: "not_relevant"
      label: "Not relevant"
    - id: "weak"
      label: "Weak"
    - id: "already_covered"
      label: "Already covered"

  # ─── Editorial voice ──────────────────────────────────────────────────
  # The "soul" of Scout — universal journalism guidelines applied across
  # every newsletter. Editable from Settings → Editorial. "Reset to default"
  # restores Scout's shipped voice.
  voice: |
    - **Format**: Single paragraph, 1-3 sentences. Self-contained and readable alone.
    - **Tone**: Neutral, authoritative. Think NYT, Bloomberg, Reuters, FT.
    - **Voice**: Active voice. Precise language. No hype words (revolutionary, game-changing, groundbreaking).
    - **Attribution**: Name the source publication INLINE (e.g., "According to CNET,", "Reuters reports that").
    - **Content**: Lead with WHAT happened, then WHY it matters. No speculation.
    - **NO markdown formatting**: No bold, no links, no bullet points. Plain prose paragraph.

  # ─── Topic-specific overlay (additive on top of universal baseline) ───
  # Scout's prompt has universal KEEP/DISCARD rules. These fields add
  # YOUR newsletter's topic-specific rules. Editable from Settings →
  # Editorial. "Restore your initial setup" reverts to the snapshot
  # captured at first install.
  extra_include_criteria: |
    - Covers spatial computing, AR, VR, MR, XR hardware or software
    - Announces new headsets, glasses, spatial displays, or haptic devices
    - Covers spatial computing platforms, SDKs, or developer tools
    - Discusses AI/ML applied to spatial contexts (computer vision, 3D generation, scene understanding, SLAM)
    - Reports on enterprise XR adoption or deployment
    - Announces a frontier AI model launch or paradigm shift (GPT, Claude, Gemini — major releases only)
    - Published academic research relevant to spatial computing or spatial AI

  extra_exclude_criteria: |
    - General consumer tech news unrelated to spatial/XR
    - Gaming news that isn't specifically about VR/AR/MR
    - Incremental AI news (minor updates, funding rounds, hiring)

  # ─── Universal DISCARD rules ──────────────────────────────────────────
  # Scout's default discard rules — applied to every newsletter. The `rule`
  # is the literal line that appears in the Scout prompt; flip `enabled`
  # to false to drop a rule for a beat where it doesn't apply (e.g. a
  # patent-watch newsletter would disable the patents rule). Editable
  # toggles live under Settings → Editorial → Advanced.
  universal_discards:
    - id: "patents"
      label: "Discard patent filings"
      rule: "**Patent filings** (ALWAYS discard)"
      enabled: true
    - id: "opinion_unanchored"
      label: "Discard opinion / commentary without a news anchor"
      rule: "Opinion or commentary without a news anchor"
      enabled: true
    - id: "stale_7d"
      label: "Discard items older than 7 days"
      rule: "Older than 7 days"
      enabled: true
    - id: "off_topic"
      label: "Discard general news unrelated to your topics"
      rule: "General news unrelated to {{topics}}"
      enabled: true
    - id: "duplicates"
      label: "Discard duplicates (keep the better source)"
      rule: "Duplicate of another article already marked YES (keep the better source)"
      enabled: true

  # ─── Sections ─────────────────────────────────────────────────────────
  # The category buckets the Editor assigns each item to. Rendered as the
  # Categories table in the Editor prompt, in this order. Editable from
  # Settings → Sections.
  sections:
    - name: "HIGHLIGHTS"
      description: "Major stories of the week — significant announcements, strategy shifts, market moves"
    - name: "APPLE VISION PRO"
      description: "Apple Vision Pro coverage: usage, apps, workflows, and notable reports."
    - name: "APP STORE HIGHLIGHTS"
      description: "Notable new or updated apps/games for Apple Vision Pro"
    - name: "GAMING MARKETPLACE"
      description: "VR/AR/XR gaming industry — studios, releases, market shifts"
    - name: "INVESTMENT"
      description: "Funding rounds, acquisitions, M&A in XR/AI/spatial"
    - name: "HARDWARE"
      description: "New devices, displays, optics, chips, sensors — anything physical"
    - name: "SOFTWARE"
      description: "Platform updates, OS releases, SDKs, developer tools, runtime changes"
    - name: "AI AND SIMULATED WORLDS"
      description: "AI models, world models, simulation, compute — when relevant to spatial/XR or seismic"
    - name: "HANDS ON REVIEW"
      description: "First-hand reviews of headsets, glasses, apps, or experiences"
    - name: "RESEARCH"
      description: "Academic studies, clinical trials, published papers using XR/VR/AR"
    - name: "OPINION"
      description: "Analysis pieces, editorials, commentary — attributed to author/publication"

# --- LLM Settings ---
# Default applies to every agent unless overridden in the per-stage blocks below.
# Per-stage routing lets you put the cheap/fast model on high-volume work (Scout)
# and the quality model on editorial work (Editor, Curator).
#
# Supported providers:
#   claude   — local `claude` CLI (Claude Pro/Max subscription, no API key)
#   openai   — OpenAI, OR any OpenAI-compatible endpoint via `api_base`
#              (Ollama, LM Studio, vLLM, Together, Groq, DeepSeek, etc.)
#   gemini   — Google Gemini via `GEMINI_API_KEY`
#
# Examples:
#   default:                          # current default — Claude CLI
#     provider: "claude"
#   scout:                            # cheap, fast model for high-volume filtering
#     provider: "openai"
#     model: "gpt-4o-mini"
#   editor:                           # quality matters for editorial voice
#     provider: "openai"
#     model: "claude-opus-4-7"        # via OpenAI-compatible gateway
#   curator:
#     provider: "claude"
#
# Ollama (local Llama 3.1):
#   default:
#     provider: "openai"
#     model: "llama3.1"
#     api_base: "http://localhost:11434/v1"
#     api_key: "ollama"
#
# Groq (extremely fast inference):
#   default:
#     provider: "openai"
#     model: "llama-3.1-70b-versatile"
#     api_base: "https://api.groq.com/openai/v1"
#     api_key_env: "GROQ_API_KEY"
llm:
  default:
    provider: "claude"
    model: ""

# --- Adaptive learning ---
# When enabled, each pipeline run injects recent user decisions into the
# agent prompts as few-shot examples — Scout sees recently rejected items
# (with the hide reason), Editor sees items recently promoted to HIGHLIGHTS.
# Learning is bounded by a sliding window + a hard cap on examples, and
# consumes only user-authored signals (hide_reason tags, manual promotes,
# saves). It augments the criteria above; it does not replace them.
# Flip `enabled: false` to make the prompt byte-equivalent to the prior
# (non-learning) version.
learning:
  enabled: true
  scout:
    window_days: 30
    max_examples: 15
  editor:
    window_days: 30
    max_highlights_examples: 6

# --- Editorial Policy ---
editorial_policy:
  tone: "Neutral, authoritative — modeled after NYT, Bloomberg, Reuters, FT. Concise, factual, no hype. Active voice, precise language."
  format: "Each item is a single paragraph (1-3 sentences). No bullet points, no bold titles. Attribution to source publication inline (e.g., 'according to CNET', 'Reuters reports'). No explicit links in body text."
  rules:
    - "NEVER include patent filings"
    - "Vision Pro section covers usage, apps, workflows, and notable reports"
    - "Always attribute source publication inline"
    - "No editorializing in non-OPINION sections"
    - "Prefer primary sources over aggregator rewrites"
    - "Each item is self-contained — one paragraph, readable alone"

# --- Newsletter Structure ---
# SPOTLIGHT is NOT a category — it's a 2-3 sentence summary of the week's highlights,
# written by the Curator as the intro paragraph. No items live in it.
# The section order below defines the newsletter layout.
newsletter_section_order:
  - "HIGHLIGHTS"
  - "APPLE VISION PRO IN THE NEWS"
  - "APP STORE HIGHLIGHTS"
  - "GAMING MARKETPLACE WATCH"
  - "INVESTMENT"
  - "SOFTWARE"
  - "HARDWARE"
  - "AI AND SIMULATED WORLDS"
  - "RESEARCH"
  - "NEW EXPERIENCES"
  - "HANDS-ON REVIEW"
  - "OPINION"

# --- Categories (must match the names used in newsletter_section_order above) ---
categories:
  - name: "HIGHLIGHTS"
    description: "The most important 4-6 stories of the week across all topics. Lead items. These get the most prominent placement after the spotlight intro."
    keywords: ["major announcement", "launch", "strategy shift", "market move"]

  - name: "APPLE VISION PRO IN THE NEWS"
    description: "Apple Vision Pro coverage: usage, apps, workflows, developer stories, and notable reports."
    keywords: ["Vision Pro", "visionOS", "spatial computing"]

  - name: "APP STORE HIGHLIGHTS"
    description: "Notable new or updated apps and games for Vision Pro on the App Store."
    keywords: ["App Store", "visionOS app", "spatial app", "Vision Pro game"]

  - name: "GAMING MARKETPLACE WATCH"
    description: "VR/AR/XR gaming industry news — studios, releases, market shifts, hardware for gaming."
    keywords: ["VR gaming", "Quest game", "PSVR", "VR studio", "gaming VR"]

  - name: "INVESTMENT"
    description: "Funding rounds, acquisitions, M&A, financial moves in XR/AI/spatial computing."
    keywords: ["funding", "acquisition", "investment", "IPO", "raised", "acquired", "M&A"]

  - name: "SOFTWARE"
    description: "Platform updates, OS releases, SDKs, developer tools, runtime changes."
    keywords: ["SDK", "OS update", "developer tools", "platform", "runtime", "API", "open source"]

  - name: "HARDWARE"
    description: "New devices, displays, optics, chips, sensors — anything physical."
    keywords: ["headset", "glasses", "display", "chip", "sensor", "optics", "OLED", "micro-LED", "PPI"]

  - name: "AI AND SIMULATED WORLDS"
    description: "AI models, world models, simulation, generative AI, compute infrastructure — when relevant to spatial/XR or when seismic enough to matter."
    keywords: ["AI model", "world model", "simulation", "compute", "LLM", "frontier model", "Claude", "GPT", "Gemini"]

  - name: "RESEARCH"
    description: "Academic studies, clinical trials, published papers — XR/VR/AR used in research contexts."
    keywords: ["study", "research", "university", "clinical trial", "found that", "published"]

  - name: "NEW EXPERIENCES"
    description: "Real-world XR/VR deployments and experiences — location-based entertainment, immersive installations, enterprise/military/government training programs, simulation-for-training, and education use cases."
    keywords: ["experience", "training", "simulation", "deployment", "installation", "location-based", "immersive", "exhibit"]

  - name: "HANDS-ON REVIEW"
    description: "First-hand reviews of headsets, glasses, apps, or experiences — journalists or creators sharing direct usage impressions."
    keywords: ["review", "hands on", "first impressions", "I tried", "we tested", "tested"]

  - name: "OPINION"
    description: "Analysis pieces, editorials, commentary from journalists or execs. Attributed to the author/publication."
    keywords: ["argues", "questions whether", "opinion", "analysis", "commentary", "according to"]

